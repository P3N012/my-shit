services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insight
      POSTGRES_PASSWORD: insight
      POSTGRES_DB: insight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insight"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment: &api_env
      DATABASE_URL: postgresql+psycopg2://insight:insight@db:5432/insight
      REDIS_URL: redis://redis:6379/0
      ACCESS_TOKEN_SECRET: dev-access-secret-do-not-use-in-prod
      REFRESH_TOKEN_SECRET: dev-refresh-secret-do-not-use-in-prod
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: INFO
      RATE_LIMIT_ENABLED: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: claude-opus-4-7
      AI_ENABLED: "true"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_CONNECT_CLIENT_ID: ${STRIPE_CONNECT_CLIENT_ID:-}
      STRIPE_OAUTH_REDIRECT_URI: ${STRIPE_OAUTH_REDIRECT_URI:-http://localhost:8000/api/v1/connections/stripe/callback}
      STRIPE_OAUTH_SUCCESS_URL: ${STRIPE_OAUTH_SUCCESS_URL:-http://localhost:3000/oauth/stripe?stripe=ok}
      STRIPE_OAUTH_FAILURE_URL: ${STRIPE_OAUTH_FAILURE_URL:-http://localhost:3000/oauth/stripe?stripe=error}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: .
    environment: *api_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: ["arq", "worker.WorkerSettings"]

volumes:
  pgdata:
